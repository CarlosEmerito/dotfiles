# EmeDotEme Custom Theme - Purple & Yellow

foreground              #EBE5F0
background              #191324
selection_foreground    #191324
selection_background    #F9D342

# Cursor colors
cursor                  #F9D342
cursor_text_color       #191324

# URL underline color when hovering with mouse
url_color               #F9D342

# Kitty window border colors
active_border_color     #9D4EDD
inactive_border_color   #2A1E38
bell_border_color       #F9D342

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #191324
active_tab_background   #F9D342
inactive_tab_foreground #EBE5F0
inactive_tab_background #2A1E38
tab_bar_background      #191324

# Colors for marks
mark1_foreground #191324
mark1_background #9D4EDD
mark2_foreground #191324
mark2_background #F9D342
mark3_foreground #191324
mark3_background #A394B0

# The 16 terminal colors

# black
color0 #191324
color8 #2A1E38

# red
color1 #FF5555
color9 #FF5555

# green
color2  #50FA7B
color10 #50FA7B

# yellow
color3  #F9D342
color11 #F1FA8C

# blue
color4  #9D4EDD
color12 #9D4EDD

# magenta
color5  #BD93F9
color13 #BD93F9

# cyan
color6  #8BE9FD
color14 #8BE9FD

# white
color7  #EBE5F0
color15 #A394B0

# Customizations
font_family      JetBrainsMono Nerd Font
font_size        11.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Remote Control
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Transparency
background_opacity 0.9
confirm_os_window_close 0

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 2000

# Bell
enable_audio_bell no

# Window layout
window_padding_width 10

# Keybindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
