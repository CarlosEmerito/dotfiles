# Kitty config
# Modern dark theme

font_family CommitMono Nerd Font
font_size 12

# Colors - Catppuccin Mocha
foreground #cdd6f4
background #1e1e2e
selection_background #45475a
selection_foreground #cdd6f4

# Cursor
cursor #f5e0dc
cursor_shape block
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 5.0

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Window
window_padding_width 8
window_border_width 1
draw_minimal_borders yes

# Tabs
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_separator " |"

# Bell
enable_audio_bell no
visual_bell_duration 0

# URL
detect_urls yes
url_style curved

# Mouse
mouse_hide_wait 3
copy_on_select yes

# Keybindings
map super+plus change_font_size all +2
map super+- change_font_size all -2
map super+0 change_font_size all 0
