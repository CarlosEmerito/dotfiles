# Btop config

# Theme name (default, dark, light, gruvbox, dracula, monokai, nord, solarized)
theme = "monokai"

# Refresh rate in milliseconds
update_interval = 1000

# CPU graph symbol (BLOCK_BQUANTILE, BLOCK_BAR, Braille_unicode, Braille_ascii)
cpu_graph = "BLOCK_BAR"

# Default CPU frequency unit (GHz, MHz)
cpu_unit = "GHz"

# Enable/disable showing CPU temperature
show_cpu_temp = true

# Show CPU frequency for all cores
cpu_core_count = 4

# Enable/disable per cpu core graphs
per_cpu_graphs = true

# Show battery health percentage
battery_health = true

# Enable/disable running processes count
show_process_count = true

# Show memory in IEC (1024) or SI (1000) units
mem_iec = true

# Show/disable swap
show_swap = true

# Show swap as an absolute value or as percentage
swap_as_absolute = true

# Show individual disk read/write rates
show_disk_io_rate = true

# Show cumulative disk I/O
show_disk_io_cumulative = false

# Show read/write bytes per second for each process
process_speed = true

# Show battery time remaining
battery_time = true
